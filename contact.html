<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Gracie Mitchell</title>
  <link rel="icon" type="image/png" href="images/favicon.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="header"></div>

  <main class="page-section container">
    <h1 class="page-title">Contact</h1>

    <section class="contact-grid">
      <div class="card">
        <h2 class="section-title">Get in Touch</h2>
        <p>Email: Mitchellgracie05@gmail.com</p>
        <p>Number: (336)-561-3207</p>
        <p>LinkedIn: https://www.linkedin.com/in/graciemitchell/</p>
        <p>GitHub: https://github.com/gmitchel1</p>
      </div>

      <div class="card">
        <h2 class="section-title">Send Me a Message</h2>
        <form action="mailto:yourname@email.com" method="post" enctype="text/plain">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" required>

          <label for="email">Email</label>
          <input type="email" id="email" name="email" required>

          <label for="message">Message</label>
          <textarea id="message" name="message" required></textarea>

          <button type="submit" class="btn">Send</button>
        </form>
      </div>
    </section>
  </main>

  <div id="footer"></div>
  <script src="script.js"></script>
</body>
</html>
